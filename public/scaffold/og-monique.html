<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<title>OG Preview · Monique</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    background: #003F3F;
    font-family: 'Inter', Arial, sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px; height: 630px;
    padding: 80px 96px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: linear-gradient(135deg, #003F3F 0%, #0a5050 60%, #003F3F 100%);
    color: #FAF7F1;
    position: relative;
    overflow: hidden;
  }
  .gold-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 14px;
    background: #D4AF37;
  }
  .top { display: flex; align-items: center; gap: 18px; }
  .logo {
    width: 56px; height: 56px; border-radius: 50%;
    background: #D4AF37; color: #003F3F;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 700;
    font-size: 28px;
  }
  .brand {
    font-family: 'Inter', sans-serif;
    font-size: 18px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(250,247,241,0.7); font-weight: 700;
  }
  .body { }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic; font-weight: 700;
    font-size: 160px; line-height: 0.95; margin: 0;
    color: #FAF7F1;
    letter-spacing: -0.02em;
  }
  .sub {
    font-family: 'Inter', sans-serif;
    font-size: 30px; line-height: 1.4;
    color: rgba(250,247,241,0.78); font-weight: 500;
    margin-top: 28px;
    max-width: 880px;
  }
  .bottom {
    font-family: 'Inter', sans-serif;
    font-size: 18px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #D4AF37; font-weight: 700;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="gold-accent"></div>

    <div class="top">
      <div class="logo">M</div>
      <div class="brand">MAMS · The direct line</div>
    </div>

    <div class="body">
      <h1>Meet <em>Monique</em>.</h1>
      <div class="sub">A direct line to genuine, curated help. Drop in with anything, get back something built around you.</div>
    </div>

    <div class="bottom">For you, at any time</div>
  </div>
</body>
</html>
