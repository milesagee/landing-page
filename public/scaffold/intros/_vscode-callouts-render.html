<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Render: VS Code with callouts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #1e1e1e; width: 1739px; height: 1286px; overflow: hidden; }

  .stage {
    position: relative;
    width: 1739px;
    height: 1286px;
  }
  .stage img {
    width: 1739px;
    height: 1286px;
    display: block;
  }
  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .callout {
    position: absolute;
    font-family: 'Caveat', cursive;
    color: #FFD56B;
    text-shadow:
      0 0 6px rgba(0,0,0,0.95),
      0 0 12px rgba(0,0,0,0.7),
      1px 1px 0 #000;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: 0.01em;
  }
  .callout.small { font-size: 32px; }
  .callout.med   { font-size: 40px; }
  .callout.big   { font-size: 52px; }

  .arrow-svg { position: absolute; overflow: visible; pointer-events: none; }
  .arrow-svg path,
  .arrow-svg polyline,
  .arrow-svg circle {
    fill: none;
    stroke: #FFD56B;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.85));
  }
  .arrow-svg .filled { fill: #FFD56B; }

  .underline {
    position: absolute;
    height: 5px;
    background: #FFD56B;
    border-radius: 3px;
    box-shadow: 0 0 6px rgba(0,0,0,0.85);
    transform: rotate(-1.5deg);
  }
</style>
</head>
<body>

<div class="stage">
  <img src="_vscode-source.png" alt="VS Code workspace">

  <div class="overlay">

    <!-- CALLOUT 1: file tree / library -->
    <div class="callout big" style="top: 14px; left: 240px;">
      The library.
    </div>
    <div class="callout med" style="top: 70px; left: 240px;">
      every folder is a different space
    </div>
    <!-- Arrow from label down/left into the sidebar -->
    <svg class="arrow-svg" style="top: 60px; left: 180px;" width="220" height="220" viewBox="0 0 220 220">
      <path d="M 180 50 Q 110 90 60 160" />
      <polyline class="filled" points="60,160 80,148 72,170" />
    </svg>

    <!-- CALLOUT 2: anika project folder -->
    <div class="callout med" style="top: 600px; left: 250px; transform: rotate(-1deg);">
      Anika has her own
    </div>
    <div class="callout med" style="top: 642px; left: 250px; transform: rotate(-1deg);">
      space right here.
    </div>
    <div class="callout small" style="top: 696px; left: 250px; color: #FFE89C;">
      Mom and Dad will too.
    </div>
    <!-- Arrow pointing left to the anika-partner row in sidebar -->
    <svg class="arrow-svg" style="top: 588px; left: 130px;" width="180" height="80" viewBox="0 0 180 80">
      <path d="M 140 40 Q 90 30 30 40" />
      <polyline class="filled" points="30,40 50,30 50,50" />
    </svg>
    <!-- Subtle underline on the anika-partner row -->
    <div class="underline" style="top: 615px; left: 16px; width: 122px;"></div>

    <!-- CALLOUT 3: left panel = building your pages -->
    <div class="callout big" style="top: 1110px; left: 290px; transform: rotate(-0.5deg);">
      Building your pages
    </div>
    <div class="callout med" style="top: 1172px; left: 290px;">
      right now.
    </div>
    <!-- Arrow from label up into left panel chat -->
    <svg class="arrow-svg" style="top: 1040px; left: 350px;" width="200" height="120" viewBox="0 0 200 120">
      <path d="M 60 105 Q 70 60 130 20" />
      <polyline class="filled" points="130,20 110,28 122,42" />
    </svg>

    <!-- CALLOUT 4: right panel = ethan in parallel -->
    <div class="callout big" style="top: 1110px; left: 1090px; transform: rotate(0.5deg);">
      And in parallel,
    </div>
    <div class="callout med" style="top: 1172px; left: 1090px;">
      Ethan's home-buyer portal is being fixed.
    </div>
    <!-- Arrow from label up into right panel chat -->
    <svg class="arrow-svg" style="top: 1040px; left: 1130px;" width="240" height="120" viewBox="0 0 240 120">
      <path d="M 60 105 Q 90 50 170 20" />
      <polyline class="filled" points="170,20 150,24 162,40" />
    </svg>

  </div>
</div>

</body>
</html>
