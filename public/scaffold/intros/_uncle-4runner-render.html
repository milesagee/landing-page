<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Render: 4Runner with callouts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #1e1e1e; width: 1200px; height: 1600px; overflow: hidden; }

  .stage {
    position: relative;
    width: 1200px;
    height: 1600px;
  }
  .stage img {
    width: 1200px;
    height: 1600px;
    display: block;
    object-fit: cover;
  }
  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .callout {
    position: absolute;
    font-family: 'Caveat', cursive;
    color: #FFD56B;
    text-shadow:
      0 0 6px rgba(0,0,0,0.95),
      0 0 14px rgba(0,0,0,0.75),
      1px 1px 0 #000;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: 0.01em;
  }
  .callout.small { font-size: 28px; }
  .callout.med   { font-size: 38px; }
  .callout.big   { font-size: 52px; }
  .callout.hero  { font-size: 70px; }

  .arrow-svg { position: absolute; overflow: visible; pointer-events: none; }
  .arrow-svg path,
  .arrow-svg polyline,
  .arrow-svg circle {
    fill: none;
    stroke: #FFD56B;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.85));
  }
  .arrow-svg .filled { fill: #FFD56B; }
</style>
</head>
<body>

<div class="stage">
  <img src="_uncle-4runner-source.jpg" alt="The 4Runner">

  <div class="overlay">

    <!-- HERO: top-left, in the sky -->
    <div class="callout hero" style="top: 50px; left: 60px; transform: rotate(-2deg);">
      Three years.
    </div>
    <div class="callout big" style="top: 132px; left: 80px; transform: rotate(-1deg); color: #FFE89C;">
      Still grateful.
    </div>

    <!-- TINT: arrow lands on rear-quarter window (3rd-row glass, heavily tinted) at world ~(860, 700) -->
    <div class="callout med" style="top: 460px; left: 720px; transform: rotate(-1deg);">
      Limo tint
    </div>
    <div class="callout small" style="top: 508px; left: 720px; color: #FFE89C;">
      all the way around.
    </div>
    <!-- arrow-box origin at left:760 top:560; head at world (860, 700) → local (100, 140) -->
    <svg class="arrow-svg" style="top: 560px; left: 760px;" width="220" height="220" viewBox="0 0 220 220">
      <path d="M 40 30 Q 70 80 100 140" />
      <polyline class="filled" points="100,140 80,135 90,120" />
    </svg>

    <!-- AUDIO: arrow head lands IN driver's window at world (400, 720) -->
    <div class="callout med" style="top: 460px; left: 320px; transform: rotate(-1deg);">
      Kenwood console.
    </div>
    <div class="callout small" style="top: 508px; left: 320px; color: #FFE89C;">
      All speakers replaced.
    </div>
    <!-- box at top:560 left:320; head local (80, 160) = world (400, 720) -->
    <svg class="arrow-svg" style="top: 560px; left: 320px;" width="180" height="200" viewBox="0 0 180 200">
      <path d="M 60 10 Q 70 80 80 160" />
      <polyline class="filled" points="80,160 65,150 75,178" />
    </svg>

    <!-- BUMPER FLARES: arrow head ON front fender flare at world (230, 940) -->
    <div class="callout med" style="top: 700px; left: 20px;">
      OEM 99-02
    </div>
    <div class="callout med" style="top: 742px; left: 20px;">
      fender flares.
    </div>
    <!-- box at top:790 left:20; head local (210, 150) = world (230, 940) -->
    <svg class="arrow-svg" style="top: 790px; left: 20px;" width="260" height="200" viewBox="0 0 260 200">
      <path d="M 70 30 Q 140 90 210 150" />
      <polyline class="filled" points="210,150 190,148 200,128" />
    </svg>

    <!-- LIFT: arrow head in rear wheel-arch lift gap. Label sits in pavement area below truck to avoid overlapping body. -->
    <div class="callout med" style="top: 1240px; left: 460px; transform: rotate(-2deg);">
      2.5&quot; Dobinsons IMS.
    </div>
    <div class="callout small" style="top: 1288px; left: 460px; color: #FFE89C;">
      Teal, from SRQ.
    </div>
    <!-- box at top:950 left:480; head local (350, 0) = world (830, 950) — rear wheel arch top -->
    <svg class="arrow-svg" style="top: 950px; left: 480px;" width="400" height="320" viewBox="0 0 400 320">
      <path d="M 80 290 Q 220 150 350 10" />
      <polyline class="filled" points="350,10 340,35 365,32" />
    </svg>

    <!-- FRONT WHEEL: arrow head IN front wheel center at world (280, 1150) -->
    <div class="callout med" style="top: 1340px; left: 60px;">
      SCS Ray10s.
    </div>
    <div class="callout small" style="top: 1388px; left: 60px; color: #FFE89C;">
      Bronze, 17x8.5.
    </div>
    <!-- box at top:1150 left:60; head local (220, 0) = world (280, 1150) -->
    <svg class="arrow-svg" style="top: 1150px; left: 60px;" width="320" height="240" viewBox="0 0 320 240">
      <path d="M 180 220 Q 200 110 220 10" />
      <polyline class="filled" points="220,10 210,35 235,30" />
    </svg>

    <!-- REAR WHEEL: arrow head IN rear wheel center at world (885, 1150) -->
    <div class="callout med" style="top: 1340px; left: 720px;">
      Falken Wildpeak A/T.
    </div>
    <div class="callout small" style="top: 1388px; left: 720px; color: #FFE89C;">
      P285/70R17.
    </div>
    <!-- box at top:1150 left:720; head local (165, 0) = world (885, 1150) -->
    <svg class="arrow-svg" style="top: 1150px; left: 720px;" width="320" height="240" viewBox="0 0 320 240">
      <path d="M 140 220 Q 152 110 165 10" />
      <polyline class="filled" points="165,10 155,35 180,30" />
    </svg>

    <!-- BOTTOM SIGNATURE LINE -->
    <div class="callout small" style="top: 1530px; left: 60px; color: #FFE89C; font-style: italic;">
      Every choice on it tries to honor where it came from.
    </div>

  </div>
</div>

</body>
</html>
